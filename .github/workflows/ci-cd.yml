name: CI/CD VitalSync

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/vitalsync-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/vitalsync-frontend

# ─────────────────────────────────────────────────────────────
# Étape 1 – Lint & Tests
# ─────────────────────────────────────────────────────────────
jobs:
  lint-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run ESLint
        working-directory: backend
        run: npm run lint

      - name: Run tests
        working-directory: backend
        run: npm test

# ─────────────────────────────────────────────────────────────
# Étape 2 – Build & Push Docker
# ─────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

# ─────────────────────────────────────────────────────────────
# Étape 3 – Déploiement staging + health check
# ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy staging & Health check
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/health; then
              echo "Backend is up!"
              exit 0
            fi
            echo "Attempt $i/15 - retrying in 3s..."
            sleep 3
          done
          echo "Health check failed after 15 attempts"
          docker compose logs backend
          exit 1
