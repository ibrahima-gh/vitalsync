# AVERTISSEMENT : valeurs en clair à des fins de démonstration uniquement.
# En production, utiliser Sealed Secrets, Vault ou des variables CI injectées
# via kubectl create secret generic plutôt que de commiter ce fichier.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: <your_db_user>
  POSTGRES_PASSWORD: <your_db_password>
  POSTGRES_DB: <your_db_name>
